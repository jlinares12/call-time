version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
      POSTGRES_DB: movie-night
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movie-night"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: prod
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/movie-night
      TMDB_API_KEY: ${TMDB_API_KEY}
    ports:
      - "127.0.0.1:5000:5000"
    restart: always
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

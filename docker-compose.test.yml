services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: movie-night-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movie-night-test"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-runner:
    build:
      context: ./api
      dockerfile: Dockerfile.test
    env_file:
      - .env.test
    depends_on:
      test-db:
        condition: service_healthy
    command: pytest tests/ -v

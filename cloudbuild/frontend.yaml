availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/call-time-$_ENV-clerk-publishable-key/versions/latest
      env: VITE_CLERK_PUBLISHABLE_KEY

steps:
  - id: install-and-build
    name: node:20
    entrypoint: bash
    secretEnv: ["VITE_CLERK_PUBLISHABLE_KEY"]
    args:
      - -c
      - |
        npm ci
        npm run build

  - id: upload-hashed-assets
    name: gcr.io/cloud-builders/gsutil
    args:
      - -m
      - -h
      - Cache-Control:public,max-age=31536000,immutable
      - rsync
      - -r
      - -x
      - "index.html$"
      - dist/
      - gs://$_BUCKET/

  - id: upload-index
    name: gcr.io/cloud-builders/gsutil
    args:
      - -h
      - Cache-Control:no-cache,no-store
      - cp
      - dist/index.html
      - gs://$_BUCKET/index.html

options:
  logging: CLOUD_LOGGING_ONLY
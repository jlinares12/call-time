steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --target=prod
      - -t=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/api:$SHORT_SHA
      - -t=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/api:$_ENV-latest
      - -f=api/Dockerfile
      - api/

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/api

  - id: migrate
    name: gcr.io/google-cloud-sdk/slim
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs update $_MIGRATE_JOB \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/api:$SHORT_SHA \
          --region=$_REGION \
          --project=$PROJECT_ID
        gcloud run jobs execute $_MIGRATE_JOB \
          --region=$_REGION \
          --project=$PROJECT_ID \
          --wait

  - id: deploy
    name: gcr.io/google-cloud-sdk/slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/api:$SHORT_SHA
      - --region=$_REGION
      - --project=$PROJECT_ID

  - id: smoke-test
    name: gcr.io/cloud-builders/curl
    args:
      - -fsS
      - https://$_DOMAIN/api/health

options:
  logging: CLOUD_LOGGING_ONLY
name: CI

on:
    pull_request:
        branches: [dev, main]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: package-lock.json

          - name: Install frontend dependencies
            run: npm ci

          - name: Run frontend lint
            run: npm run lint

          - name: Setup Python
            uses: actions/setup-python@v5
            with:
                python-version: '3.12'
                cache: 'pip'
                cache-dependency-path: api/requirements.txt

          - name: Install ruff
            run: pip install ruff

          - name: Run backend lint
            run: ruff check api/

    backend-tests:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: call-time-test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
          - uses: actions/checkout@v4
          - name: Setup Python
            uses: actions/setup-python@v5
            with:
                python-version: '3.12'
                cache: pip
          - name: Install dependencies
            run: |
                cd api
                pip install -r requirements.txt -r requirements.test.txt
          - name: Run backend tests
            env:
                DATABASE_URL: postgresql://postgres:postgres@localhost:5432/call-time-test
                SECRET_KEY: test-secret-key
                TMDB_API_KEY: test-key
                CLERK_WEBHOOK_SECRET: test-webhook-secret
            run: |
                cd api
                pytest tests/ -v

    frontend-tests:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: package-lock.json

          - name: Install frontend dependencies
            run: npm ci

          - name: Run frontend tests
            run: npm test -- --watchAll=false --passWithNoTests

    e2e:
        if: github.base_ref == 'main'
        runs-on: ubuntu-latest
        needs: [lint, backend-tests, frontend-tests]
        steps:
        - uses: actions/checkout@v4

        - name: Create .env.e2e from secrets
          run: |
            echo "CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}" >> .env.e2e
            echo "CLERK_JWKS_URL=${{ secrets.CLERK_JWKS_URL }}" >> .env.e2e
            echo "VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}" >> .env.e2e
            echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> .env.e2e
            echo "CLERK_WEBHOOK_SECRET=${{ secrets.CLERK_WEBHOOK_SECRET }}" >> .env.e2e
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env.e2e
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env.e2e

        - name: Run e2e tests
          run: ./run_e2e_tests.sh

        - name: Upload test results on failure
          if: failure()
          uses: actions/upload-artifact@v4
          with:
              name: playwright-report
              path: e2e/test-results/
